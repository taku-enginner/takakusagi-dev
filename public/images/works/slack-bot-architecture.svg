<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="title desc" font-family="'BIZ UDPGothic', 'Inter', system-ui, sans-serif">
  <title id="title">claude-slack-bot の構成図</title>
  <desc id="desc">Slack からのイベントを bot.py で受け、Anthropic API と kibunlog API を呼び出す。会話履歴は conversation_store に永続化される。</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A7259" />
    </marker>
    <style>
      .box { fill: #FFFEFB; stroke: #7A9374; stroke-width: 1.8; rx: 12; ry: 12; }
      .box-main { fill: #E7EFE5; stroke: #5A7259; stroke-width: 2; }
      .box-store { fill: #FAF9F5; stroke: #C9C5BA; stroke-width: 1.5; stroke-dasharray: 5 4; }
      .title-text { fill: #2E2E2E; font-size: 17px; font-weight: 700; }
      .sub-text { fill: #4A4A48; font-size: 13px; }
      .label-text { fill: #5A7259; font-size: 12px; font-weight: 600; }
      .note-text { fill: #7A7A75; font-size: 11px; }
      .line { stroke: #5A7259; stroke-width: 2; fill: none; }
      .line-dashed { stroke: #7A9374; stroke-width: 1.5; fill: none; stroke-dasharray: 6 5; }
    </style>
  </defs>

  <!-- Slack (top) -->
  <rect x="280" y="20" width="160" height="60" rx="12" ry="12" class="box" />
  <text x="360" y="46" text-anchor="middle" class="title-text">Slack</text>
  <text x="360" y="66" text-anchor="middle" class="sub-text">ユーザーのメンション</text>

  <!-- Arrow: Slack -> bot.py -->
  <path d="M 360 84 L 360 158" class="line" marker-end="url(#arrow)" />
  <text x="370" y="125" class="label-text">Events API / Bolt</text>

  <!-- bot.py (center) -->
  <rect x="240" y="160" width="240" height="80" rx="12" ry="12" class="box-main" />
  <text x="360" y="190" text-anchor="middle" class="title-text">bot.py</text>
  <text x="360" y="212" text-anchor="middle" class="sub-text">core.py / features/* / hooks/</text>
  <text x="360" y="228" text-anchor="middle" class="note-text">systemd ユーザーサービスで常駐</text>

  <!-- conversation_store (left of bot.py) -->
  <rect x="40" y="170" width="160" height="60" rx="12" ry="12" class="box-store" />
  <text x="120" y="196" text-anchor="middle" class="title-text">conversation_store</text>
  <text x="120" y="216" text-anchor="middle" class="sub-text">会話履歴 (JSON 永続化)</text>

  <!-- Dashed line bot.py <-> conversation_store -->
  <path d="M 240 200 L 200 200" class="line-dashed" />

  <!-- Arrow: bot.py -> Anthropic API -->
  <path d="M 300 244 L 200 360" class="line" marker-end="url(#arrow)" />
  <text x="195" y="305" text-anchor="end" class="label-text">プロンプト + 履歴</text>

  <!-- Arrow: bot.py -> kibunlog API -->
  <path d="M 420 244 L 520 360" class="line" marker-end="url(#arrow)" />
  <text x="525" y="305" class="label-text">記録 / 参照</text>

  <!-- Anthropic API (bottom left) -->
  <rect x="80" y="360" width="200" height="80" rx="12" ry="12" class="box" />
  <text x="180" y="390" text-anchor="middle" class="title-text">Anthropic API</text>
  <text x="180" y="412" text-anchor="middle" class="sub-text">Claude (応答生成)</text>

  <!-- kibunlog API (bottom right) -->
  <rect x="440" y="360" width="200" height="80" rx="12" ry="12" class="box" />
  <text x="540" y="390" text-anchor="middle" class="title-text">kibunlog API</text>
  <text x="540" y="412" text-anchor="middle" class="sub-text">kibunrogu_client.py 経由</text>
</svg>
